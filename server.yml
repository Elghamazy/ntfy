# ntfy server configuration — optimized for Koyeb
# Full reference: https://docs.ntfy.sh/config/

# Koyeb terminates TLS for you, set this to your Koyeb app URL
# e.g. https://your-app-name-yourorg.koyeb.app
base-url: https://your-app-name-yourorg.koyeb.app

# Replaced at runtime by entrypoint.sh using $PORT injected by Koyeb
listen-http: ":8080"

# Data directory (ephemeral on Koyeb unless a volume is mounted)
data-dir: /var/lib/ntfy

cache-file: /var/lib/ntfy/cache.db
cache-duration: "12h"

auth-file: /var/lib/ntfy/auth.db

# deny-all = auth required to publish and subscribe (most secure)
auth-default-access: "deny-all"

# Required — Koyeb sits behind a load balancer
behind-proxy: true

attachment-cache-dir: /var/lib/ntfy/attachments
attachment-total-size-limit: "1G"
attachment-file-size-limit: "15M"
attachment-expiry-duration: "3h"

visitor-subscription-limit: 30
visitor-request-limit-burst: 60
visitor-request-limit-replenish: "5s"